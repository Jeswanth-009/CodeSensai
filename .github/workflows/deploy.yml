name: Deploy CodeSensei

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install Lambda dependencies
        run: |
          cd lambda/explain && npm install --production
          cd ../followup && npm install --production
          cd ../complexity && npm install --production
          cd ../history && npm install --production
          cd ../health && npm install --production

      - name: SAM Build
        run: sam build --template infrastructure/template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name codesensei-stack \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3

      - name: Output API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name codesensei-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Extension Dependencies
        run: cd extension && npm install

      - name: Build Extension
        run: cd extension && npm run compile

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codesensei-extension
          path: extension/dist/
